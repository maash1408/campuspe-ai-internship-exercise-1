<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width-device-width,initial-scale=1.0">
        <title>MyAI | Chat with Me</title>
        <!--
            Bootstrap CSS
            For adding Prebuild CSS from Bootstrap Framework For most of the UI
        -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Edu+SA+Hand:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

        <!-- 
            Custom CSS
            For adding your own styles
        -->
        <link rel="stylesheet" href="style.css">


    </head>
    <body>

        
        <div class="app-container">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <button class="new-chat-btn">
                        <i class="fas fa-plus"></i> New Chat
                    </button>
                </div>
            </aside>
        </div>

        <!--
            JQUERY js
            JQuery adds more functions to vanilla Javascript making animations and click handling(events) easier and more efficient. It is used by BootStrap for some of its components to work properly. 
        -->
        <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

        <!-- 
            Popper.js
            Popper.js is a library used to manage poppers in web applications. A popper is an element on the screen which "pops out" from the natural flow of your application. It is used by BootStrap for tooltips, popovers, and dropdowns.
        -->
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <!-- 
            BootStrap js
            BootStrap js is used to add interactive components to your web applications, such as models, tooltips, and carousels.
        -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
        
        <!--
            FontAwesome ICOn js
        -->

        <script src="https://kit.fontawesome.com/8e5685521f.js" crossorigin="anonymous"></script>

        <!--
            Custom js
            For adding your own scripts and functionality to the web applications. 
        -->
        <script src="script.js"></script>
    </body>
</html>
